sonar.organization=drsnuggles8
sonar.projectKey=drsnuggles8_OloEngineBase

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=OloEngineBase
sonar.projectVersion=0.1

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# Issue exclusions — see docs/sonarqube-rule-suggestions.md for rationale.
# Two groups:
#   tst_*  — scope mismatches on idiomatic GoogleTest code in tests/** where the
#            concern the rule guards against does not apply. Kept active on
#            production sources (OloEngine/src/**, OloEditor/src/**, ...).
#   fp_*/  — false positives the analyzer cannot see through (constrained
#   ecs_*/   templates, ECS predicate chains, X-macro template-arg pasting),
#   xmacro_* scoped as narrowly as the offending location allows.
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=tst_s5443,tst_s3656,tst_s997,tst_s1001,fp_s5000,ecs_s1067,xmacro_s963,cmp_s1244_components,cmp_s1244_rendercmd

# S5443 "avoid publicly writable directories": GoogleTest fixtures legitimately
# use std::filesystem::temp_directory_path() for isolated, self-cleaning artefacts;
# the multi-user-race attacker model does not apply to CI/dev test runs.
sonar.issue.ignore.multicriteria.tst_s5443.ruleKey=cpp:S5443
sonar.issue.ignore.multicriteria.tst_s5443.resourceKey=OloEngine/tests/**/*

# S3656 "member variables should not be protected": TEST_F fixtures require
# protected (subclass-accessible) members by design; private breaks the macro.
sonar.issue.ignore.multicriteria.tst_s3656.ruleKey=cpp:S3656
sonar.issue.ignore.multicriteria.tst_s3656.resourceKey=OloEngine/tests/**/*

# S997 "move this declaration into a namespace": GoogleTest fixture classes are
# conventionally file-scoped so the TEST_F-generated subclass can find them.
sonar.issue.ignore.multicriteria.tst_s997.ruleKey=cpp:S997
sonar.issue.ignore.multicriteria.tst_s997.resourceKey=OloEngine/tests/**/*

# S1001 "using-directive shall not be used": `using namespace OloEngine;` is the
# established convention across the test suite (engine types are pervasive there).
sonar.issue.ignore.multicriteria.tst_s1001.ruleKey=cpp:S1001
sonar.issue.ignore.multicriteria.tst_s1001.resourceKey=OloEngine/tests/**/*

# S5000 "use operator== for non-trivially-copyable types": all hits are at the
# single Math::BitwiseEqual helper, which static_asserts std::is_trivially_copyable_v<T>
# — misuse is a compile error. Sonar cannot see through the static_assert +
# template-instantiation chain and flags every callsite. False positive.
sonar.issue.ignore.multicriteria.fp_s5000.ruleKey=cpp:S5000
sonar.issue.ignore.multicriteria.fp_s5000.resourceKey=OloEngine/src/OloEngine/Math/Math.h

# S1067 "reduce conditional operators (max 3)": the ECS layer's per-component
# HasComponent<>() predicate chains and serializer dispatch intrinsically produce
# long boolean expressions; naming each sub-predicate just restates it. Scoped to
# the Scene subsystem where the pattern is inherent rather than a smell.
sonar.issue.ignore.multicriteria.ecs_s1067.ruleKey=cpp:S1067
sonar.issue.ignore.multicriteria.ecs_s1067.resourceKey=OloEngine/src/OloEngine/Scene/**/*

# S963 "parenthesise function-like macro parameters": Prefab.cpp's X-macro pastes
# component types into template-argument lists (<CompType>), where the C++ grammar
# forbids parentheses (<(CompType)> does not parse). Unsatisfiable as written.
sonar.issue.ignore.multicriteria.xmacro_s963.ruleKey=cpp:S963
sonar.issue.ignore.multicriteria.xmacro_s963.resourceKey=OloEngine/src/OloEngine/Scene/Prefab.cpp

# S1244 "floats should not be tested for equality": Components.h's per-component
# `operator==(...) = default` is the documented undo/redo change-detection hook
# (see CLAUDE.md "Editor undo/redo for components"). Defaulted member-wise float
# equality is exactly the bit-exact change-detection semantics intended here;
# rewriting each as a hand-rolled epsilon/BitwiseEqual comparison would defeat the
# `= default` pattern. Scoped to Components.h (real ==/!= float bugs elsewhere in
# Scene/** stay flagged).
sonar.issue.ignore.multicriteria.cmp_s1244_components.ruleKey=cpp:S1244
sonar.issue.ignore.multicriteria.cmp_s1244_components.resourceKey=OloEngine/src/OloEngine/Scene/Components.h

# S1244 in RenderCommand.h: PODMaterialData::operator== is a deliberate field-wise
# exact comparison for render-command change detection / dedup (it intentionally
# avoids memcmp because of struct padding — see the comment there). Exact equality
# is the wanted semantics; an epsilon compare would wrongly merge distinct materials.
sonar.issue.ignore.multicriteria.cmp_s1244_rendercmd.ruleKey=cpp:S1244
sonar.issue.ignore.multicriteria.cmp_s1244_rendercmd.resourceKey=OloEngine/src/OloEngine/Renderer/Commands/RenderCommand.h
