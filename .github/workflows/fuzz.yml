name: Fuzz Smoke

# Layer 11 (renderer-testing-strategy.md §11) — build the libFuzzer
# harnesses with Clang, run each for ~30s against the checked-in corpus,
# and upload any crashers as artifacts. This is a continuous safety net
# for the data-ingestion code paths (mesh / animation / input action YAML /
# image decoders (stb_image) / scene YAML / Assimp mesh importers /
# SPIRV-Cross decompilation).
#
# Manual-dispatch + scheduled nightly. Fuzzers are slow to bootstrap
# against a cold corpus; the goal here is regression coverage of known-
# good seeds, not open-ended novelty hunting. For that, invoke the
# `OloEngine-FuzzSmoke` target locally with a larger `-max_total_time`.

on:
  workflow_dispatch:
  schedule:
    - cron: '13 4 * * *' # Nightly at 04:13 UTC.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

jobs:
  fuzz:
    name: Fuzz smoke (ClangCL + libFuzzer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python 3.10
        id: py
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2

      - name: Setup Vulkan SDK
        uses: ./.github/actions/setup-vulkan

      - name: Configure CMake (ClangCL)
        # ClangCL is bundled with VS2022. It exposes the MSVC-compatible
        # ABI while supporting `-fsanitize=fuzzer`, which is what
        # `tests/Fuzzing/CMakeLists.txt` requires.
        run: |
          cmake -S . -B build -T ClangCL `
                -DPython_EXECUTABLE="${{ steps.py.outputs.python-path }}" `
                -DOLO_ENABLE_FUZZING=ON

      - name: Verify clang_rt runtime dir
        # cmake/Fuzzing.cmake's find_path resolved the directory containing
        # the ASan / libFuzzer runtime libs that lld-link linked against,
        # and wrote it to build/olo_clang_rt_dir.txt. We confirm the
        # matching DLL is in there; the build step then prepends this dir
        # to $env:PATH so OloHeaderTool / protoc / fuzz harnesses load the
        # *correct* clang_rt.asan_dynamic-x86_64.dll at run time.
        #
        # Why prepend in the run step rather than via $GITHUB_PATH: the
        # runner APPENDS $GITHUB_PATH entries, and the runner image already
        # has MSVC's and the standalone LLVM's directories on PATH — each
        # of which ships a *differently-versioned* DLL by the same name.
        # If ours isn't first, Windows loads MSVC's DLL whose exports don't
        # match what the LLVM-19-bundled .lib imported, and every binary
        # exits with STATUS_ENTRYPOINT_NOT_FOUND (0xC0000139) on launch.
        shell: pwsh
        run: |
          $rtDir = (Get-Content build/olo_clang_rt_dir.txt -Raw).Trim()
          if (-not (Test-Path $rtDir)) {
            Write-Error "clang_rt runtime dir from CMake doesn't exist: $rtDir"
            exit 1
          }
          if (-not (Test-Path (Join-Path $rtDir 'clang_rt.asan_dynamic-x86_64.dll'))) {
            Write-Error "clang_rt.asan_dynamic-x86_64.dll missing from $rtDir"
            exit 1
          }
          Write-Host "Resolved clang_rt dir: $rtDir"

      - name: Build fuzzers
        shell: pwsh
        run: |
          $rtDir = (Get-Content build/olo_clang_rt_dir.txt -Raw).Trim()
          # Prepend so it wins against MSVC's & standalone LLVM's same-named
          # DLLs that are already on PATH at lower priority.
          $env:PATH = "$rtDir;$env:PATH"
          cmake --build build --target OloEngine-FuzzSmoke --config Release --parallel

      - name: Run fuzz smoke (per-target 30s)
        working-directory: OloEditor
        shell: pwsh
        run: |
          # Same DLL-search rationale as the build step: prepend the clang_rt
          # dir so the fuzz harnesses load the right ASan runtime.
          $rtDir = (Get-Content ../build/olo_clang_rt_dir.txt -Raw).Trim()
          $env:PATH = "$rtDir;$env:PATH"

          # Explicit harness -> corpus mapping. A heuristic would be neat but
          # every one-off (YAML suffix, acronyms) would need a special case.
          $harnesses = @(
            @{ Name = 'FuzzAnimationBinary';  Corpus = 'animation_binary'  },
            @{ Name = 'FuzzMeshBinary';       Corpus = 'mesh_binary'       },
            @{ Name = 'FuzzInputActionYaml';  Corpus = 'input_action_yaml' },
            @{ Name = 'FuzzImageDecoder';     Corpus = 'image_decoder'     },
            @{ Name = 'FuzzSceneYaml';        Corpus = 'scene_yaml'        },
            @{ Name = 'FuzzAssimpMesh';       Corpus = 'assimp_mesh'       },
            @{ Name = 'FuzzSpirvCross';       Corpus = 'spirv_cross'       }
          )
          foreach ($h in $harnesses) {
            $exe = "..\build\OloEngine\tests\Fuzzing\Release\$($h.Name).exe"
            $corpusDir = "..\OloEngine\tests\Fuzzing\corpus\$($h.Corpus)"
            if (-not (Test-Path $corpusDir)) {
              Write-Host "::error::required corpus directory '$corpusDir' is missing; refusing to run $($h.Name) without seeds"
              exit 1
            }
            & $exe -max_total_time=30 -print_final_stats=1 $corpusDir
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::$($h.Name) found a crash"
              exit $LASTEXITCODE
            }
          }

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz_crashes
          path: |
            OloEditor/crash-*
            OloEditor/leak-*
            OloEditor/timeout-*
            OloEditor/oom-*
          if-no-files-found: ignore
