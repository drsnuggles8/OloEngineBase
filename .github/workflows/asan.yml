name: Sanitizers
on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

env:
  # sccache uses a LOCAL-DISK cache (SCCACHE_DIR), persisted across runs as a
  # SINGLE actions/cache entry PER JOB (see each job's "Cache sccache storage"
  # step). We deliberately do NOT use sccache's GitHub Actions cache backend
  # (SCCACHE_GHA_ENABLED): it stores one cache entry PER OBJECT FILE, which
  # flooded the repo's 10 GB Actions-cache cap with 20k+ tiny entries and made
  # EVERY write fail (observed write-errors == misses on all four jobs, hit rate
  # then frozen/decaying). One bounded local-disk dir per job stays under the
  # cap. The -fsanitize=address|undefined|thread flag is part of each compile
  # command line (and so part of sccache's hash), so the per-sanitizer object
  # sets stay distinct; the actions/cache KEY below is also per-sanitizer so the
  # four jobs never clobber each other's snapshot.
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  # Bound the on-disk cache so each saved actions/cache entry stays small — all
  # caches (the four sccache dirs here, Windows.yml's, Vulkan, FFmpeg) share the
  # repo's single 10 GB Actions-cache cap.
  SCCACHE_CACHE_SIZE: "1500M"

permissions:
  contents: read
  # dorny/paths-filter@v4 falls back to the GitHub REST API for PR-base
  # detection on forks / when the git shallow-clone lacks the base commit,
  # which needs pull-requests: read. Granting it here keeps the detect-changes
  # job working even when the default GITHUB_TOKEN has PR scope stripped.
  pull-requests: read

jobs:
  detect-changes:
    name: Detect sanitizer-relevant changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      with:
        filters: |
          native:
            - '**/*.c'
            - '**/*.cc'
            - '**/*.cpp'
            - '**/*.cxx'
            - '**/*.h'
            - '**/*.hpp'
            - '**/*.hh'
            - '**/*.hxx'
            - '**/*.ixx'
            - '**/*.cppm'
            - '**/*.glsl'
            - '**/CMakeLists.txt'
            - 'cmake/**'
            - '.github/actions/**'
            - '.github/workflows/asan.yml'
            - '.github/sanitizer-suppressions/**'

  asan-windows:
    name: ASan (Windows/clang-cl)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    runs-on: windows-latest
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    env:
      # Disable ASan's ODR-violation checker for every instrumented binary run in
      # this job. Vendored protobuf trips a known false positive — its narrow and
      # wide "." string-literal globals (`"."` vs `L"."`, io_win32.cc vs
      # command_line_interface.cc) get flagged as an odr-violation — which aborts
      # protoc.exe when it runs during the build to generate GNS's .pb.cc, and would
      # likewise abort the instrumented test exe (and its gtest_discover_tests probe)
      # at startup. clang-cl's ASan runtime enforces this check more strictly than
      # MSVC's did, so it only surfaced after #490 switched this job to clang-cl. All
      # other ASan checks (use-after-free, overflow, …) stay on. Steps that set their
      # own ASAN_OPTIONS must re-include detect_odr_violation=0 (step env overrides,
      # it does not merge).
      ASAN_OPTIONS: detect_odr_violation=0

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install Python 3.10
      id: py
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.10'

    - name: Install python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install jinja2

    - name: Setup Vulkan SDK
      uses: ./.github/actions/setup-vulkan

    # This job builds with clang-cl (Clang front-end, MSVC ABI) via the
    # cmake/ClangCLToolchain.cmake toolchain — the same one the local
    # `clangcl-asan` preset uses. clang-cl gives the genuinely Windows-specific
    # coverage that justifies a Windows ASan job (MSVC ABI + MSVC STL + the
    # Windows-only Platform/* code) but runs Clang's more complete ASan runtime
    # instead of MSVC's, and its /Z7 objects cache under sccache (MSVC cl.exe ASan
    # objects did not — see issue #304). clang-cl still needs the MSVC headers,
    # libs, and Windows SDK on the env; ilammy/msvc-dev-cmd runs vcvars and
    # exports them, and also puts the VS-bundled LLVM (clang-cl, lld-link) on PATH.
    # We build with Ninja (not the VS generator) so the sccache compiler launcher
    # engages — the VS/MSBuild generator IGNORES CMAKE_<LANG>_COMPILER_LAUNCHER.
    # (Trade-off, same as Windows.yml: the Ninja path does not build the C#
    # OloEngine-ScriptCore project, but OloEngine-Tests never links that
    # assembly, so ASan coverage is intact.)
    - name: Setup MSVC dev environment
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      with:
        arch: x64

    # Provisions sccache and wires it to the GitHub Actions cache backend
    # (SCCACHE_GHA_ENABLED above). Must run before Configure so the launcher
    # resolves on PATH. See asan-lsan-linux for the action/sccache version-pin
    # rationale (older builds hit the decommissioned legacy cache API and fail).
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      with:
        version: "v0.15.0"

    # Persist sccache's local-disk cache as one actions/cache entry (unique key
    # per run so the post-job save always writes a fresh snapshot; restore-keys
    # warms from the most recent prior one). Key is per-sanitizer.
    - name: Cache sccache storage
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-asan-windows-${{ github.run_id }}
        restore-keys: |
          sccache-asan-windows-

    - name: Configure CMake (ASan enabled)
      # --toolchain cmake/ClangCLToolchain.cmake: build with clang-cl + lld-link
      #   (Clang front-end, MSVC ABI) — same toolchain as the local clangcl-asan
      #   preset. CMake reports clang-cl as MSVC, so cmake/Sanitizers.cmake takes
      #   the /fsanitize=address + /MD + /INCREMENTAL:NO path automatically.
      # -G "Ninja Multi-Config": required for the sccache compiler launcher to
      #   engage. The build/ctest steps still select Release via --config / -C.
      # -DOLO_ENABLE_COMPILER_CACHE=ON: wires sccache as the launcher and switches
      #   debug info to /Z7 (Embedded) so clang-cl objects are cacheable (unlike
      #   the old MSVC cl.exe ASan objects, which never cached — issue #304).
      # -DOLO_ENABLE_LTO=OFF: Release defaults LTO on; its /GL makes objects
      #   non-cacheable (and /GL + ASan is unsupported). CI binaries are for
      #   testing, not shipping, so dropping LTO is free here.
      run: >
        cmake -S . -B build
        -G "Ninja Multi-Config"
        --toolchain "${{ github.workspace }}/cmake/ClangCLToolchain.cmake"
        -DOLO_VIDEO_FFMPEG=OFF
        -DOLO_ENABLE_COMPILER_CACHE=ON
        -DOLO_ENABLE_LTO=OFF
        -DPython_EXECUTABLE="${{ steps.py.outputs.python-path }}"
        -DOLO_ENABLE_ASAN=ON
        -DBUILD_TESTS=ON

    - name: Add clang-cl ASan runtime to PATH
      shell: pwsh
      # clang-cl links the dynamic ASan runtime, so anything built with ASan needs
      # clang_rt.asan_dynamic-x86_64.dll on PATH when it RUNS — including instrumented
      # vendored host tools that execute during the build itself (e.g. protobuf's
      # protoc.exe, run to generate .pb.cc). GITHUB_PATH only affects later steps, so
      # this must run BEFORE Build, not just before the tests. The DLL ships next to
      # the clang-cl used for the build; `clang-cl -print-runtime-dir` (LLVM >= 16)
      # reports that directory. Use the same clang-cl that PATH resolves to (the one
      # CMake built with) so the DLL version matches the instrumented objects.
      run: |
        $dll = 'clang_rt.asan_dynamic-x86_64.dll'
        # -print-runtime-dir is the intended query, but newer LLVM reports a
        # per-target dir (lib/<triple>) that may not exist, while older LLVM
        # reports lib/windows. Probe both and use whichever actually holds the DLL
        # (mirrors the same resolution in cmake/Sanitizers.cmake).
        $candidates = @(
          (& clang-cl -print-runtime-dir).Trim(),
          (Join-Path (& clang-cl -print-resource-dir).Trim() 'lib/windows')
        )
        $rtDir = $candidates | Where-Object { $_ -and (Test-Path (Join-Path $_ $dll)) } | Select-Object -First 1
        if (-not $rtDir) {
          Write-Error "ASan runtime DLL '$dll' not found. Checked: $($candidates -join '; ')"
          exit 1
        }
        Write-Host "clang-cl ASan runtime dir: $rtDir"
        echo "$rtDir" >> $env:GITHUB_PATH

    - name: Build (Release)
      run: cmake --build build --config Release --target OloEngine-Tests --parallel

    # Read the cache hit rate. A cold cache (first run / after a real source
    # change) is mostly misses + writes; a warm cache shows a high hit rate,
    # meaning the build step recompiled almost nothing.
    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Create test results directory
      run: New-Item -ItemType Directory -Force -Path "${{github.workspace}}/test_results"
      shell: pwsh

    - name: Run tests under ASan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # The SteamNetworkingSockets service thread tripped a stack-buffer-overflow
      # under MSVC ASan during thread bootstrap (a 48-byte read from a 24-byte
      # `info` stack object inside vendored GNS code on the GNS-spawned thread;
      # Release ICF folding misreported the frames as `SteamNetworkingSockets_*` /
      # `pugi::xpath_*`). That is now fixed at the source: NetworkManager::Init
      # skips the live GameNetworkingSockets_Init under ASan (OLO_ASAN_ENABLED),
      # so every suite that merely constructs/uses NetworkManager runs clean.
      # (Upstream GNS bug: ValveSoftware/GameNetworkingSockets#418.) The gate is
      # keyed on OLO_ASAN_ENABLED, not the compiler, so it applies identically
      # now that this job builds with clang-cl ASan instead of MSVC cl.exe ASan.
      #
      # The Task* and Shader* suites were excluded here on a since-disproven "the
      # task system starts the Steam service thread" theory — they never touched
      # GNS (the ICF-folded stacks just looked like it) and all pass under MSVC
      # ASan, so they are no longer excluded. See issue #317.
      #
      # Remaining exclusions match the Linux ASan job exactly:
      #   NetworkIntegrationTest — drives a live client/server socket, which the
      #     ASan GNS gate intentionally disables; excluded on every sanitizer job.
      #   WorkerRestartTest — a tight 100-iteration worker-pool teardown/recreate
      #     stress test that exceeds the 120 s timeout under sanitizer
      #     instrumentation; excluded on every sanitizer job.
      #
      # --parallel 2: every gtest case is its own ctest entry (gtest_discover_tests),
      # so serial execution pays the engine's full static-init cost ~3,600× back-to-
      # back — the same win Windows.yml's non-sanitizer job banks with `--parallel 4`.
      # The suite is parallel-safe by construction: tests key their temp paths by
      # PID / gtest case name, and the handful that share the engine's repo-relative
      # mesh cache are serialized against each other with a ctest RESOURCE_LOCK
      # (OloEngine/tests/CMakeLists.txt). Capped at 2 (not 4) because ASan
      # shadow memory inflates each test process's resident footprint; 2-wide stays
      # comfortably inside the windows-latest ~16 GB budget.
      run: ctest --parallel 2 -C Release --output-on-failure --timeout 120 --exclude-regex '^NetworkIntegrationTest\.|^WorkerRestartTest\.'
      env:
        # detect_odr_violation=0 must be repeated here — a step-level ASAN_OPTIONS
        # replaces the job-level one rather than merging (see the job `env` above).
        ASAN_OPTIONS: halt_on_error=1:detect_odr_violation=0
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      with:
        name: ASan (Windows)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  asan-lsan-linux:
    name: ASan + LSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    # Pinned to ubuntu-24.04 (noble) because the LLVM apt repo URL below
    # hardcodes the distro codename. If ubuntu-latest jumps to a newer
    # release the apt source would 404.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Free up disk space
      # GitHub-hosted runners ship ~14 GB free; a sanitizer Debug link of
      # OloEngine-Tests (instrumented + vendored static libs) can exhaust it
      # ("No space left on device" during the final link). Reclaim ~20 GB of
      # preinstalled toolchains this job doesn't use. `|| true` keeps a missing
      # path from failing the job; the df lines bracket it for diagnostics.
      run: |
        df -h /
        sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/share/boost 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        df -h /

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        # The ubuntu-24.04 runner image ships Microsoft apt repos (azure-cli, prod)
        # that periodically return 403 Forbidden; we never use them (Clang comes from
        # apt.llvm.org), and `apt-get update` fails hard on any single repo error.
        # Drop any Microsoft source so a Microsoft-side outage can't break our update.
        sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f || true
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    # Provisions sccache and wires it to the GitHub Actions cache backend
    # (SCCACHE_GHA_ENABLED above). Must run before Configure so the launcher
    # resolves on PATH. This job passes no -G, so CMake uses the Unix Makefiles
    # generator, which honors CMAKE_<LANG>_COMPILER_LAUNCHER — sccache engages
    # with no generator switch (unlike the Windows job, which had to move to
    # Ninja for the launcher to take effect).
    #
    # Action v0.0.10 + sccache >= v0.10.0 are REQUIRED: GitHub decommissioned
    # the legacy Actions cache API on 2025-04-15, and older sccache builds hit
    # the dead endpoint and fail to start (and, as the compiler launcher, would
    # break every compile). v0.15.0 is the current stable pin — matches Windows.yml.
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      with:
        version: "v0.15.0"

    # Persist sccache's local-disk cache as one actions/cache entry (unique key
    # per run so the post-job save always writes a fresh snapshot; restore-keys
    # warms from the most recent prior one). Key is per-sanitizer.
    - name: Cache sccache storage
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-asan-lsan-linux-${{ github.run_id }}
        restore-keys: |
          sccache-asan-lsan-linux-

    - name: Configure CMake (ASan + LSan)
      # -fuse-ld=lld: the default GNU BFD ld holds the entire Debug +
      # sanitizer-instrumented link (engine, vendored static libs, DWARF) in
      # memory at once and can exceed the 16 GB on hosted runners — the OOM
      # reaper then kills the runner agent mid-link ("The runner has received
      # a shutdown signal", gmake "Terminated", partial output deleted). lld
      # (installed above, version-matched via clang's own bin dir) links the
      # same binary in a fraction of the memory and time.
      run: >
        cmake -S . -B build
        -DOLO_VIDEO_FFMPEG=OFF
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld
        -DOLO_ENABLE_COMPILER_CACHE=ON
        -DOLO_ENABLE_ASAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    # Read the cache hit rate. A cold cache (first run / after a real source
    # change) is mostly misses + writes; a warm cache shows a high hit rate,
    # meaning the build step recompiled almost nothing. The delta between a
    # cold and a warm run is the proof this change works.
    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under ASan + LSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # WorkerRestartTest.RestartWorkersAndOversubscription is a tight-loop
      # stress test of FScheduler::RestartWorkers that the Windows ASan job
      # (asan.yml above) and the Linux TSan job (tsan.yml) already exclude
      # as too slow under sanitizer instrumentation — hits the 120 s timeout
      # in CI. Pre-existing flakiness, unrelated to PR contents.
      #
      # --timeout 600: ShaderReflectionBinding.AllProductionShaderBindingsMatchCppLayout
      # walks every production .glsl (~100 files × ~3 stages), invoking
      # shaderc to compile each to SPIR-V and spirv-cross to reflect the
      # bindings. Under ASan instrumentation shaderc is 3-5× slower per
      # compile, and the cumulative work blows past the default 120 s.
      # 600 s gives reasonable headroom without masking actual hangs.
      #
      # --parallel 2: gtest_discover_tests registers every gtest case as its own
      # ctest entry (one OloEngine-Tests process per case), so serial execution pays
      # the engine's full static-init cost ~3,600× back-to-back — a large chunk of
      # this job's wall-clock. Windows.yml already banks this win with
      # `ctest --parallel 4`. The suite is parallel-safe by construction: tests key
      # their temp paths by PID / gtest case name, and the handful that share the
      # engine's repo-relative mesh cache are serialized against each other with a
      # ctest RESOURCE_LOCK (OloEngine/tests/CMakeLists.txt).
      #
      # Why 2 here, not Windows' 4: these are SANITIZER-instrumented test processes
      # with a much larger *resident* footprint (ASan shadow memory; TSan
      # happens-before metadata), and the ubuntu runners have only ~16 GB / 4 vCPU.
      # Two concurrent instrumented processes stay comfortably inside that budget;
      # 4-wide risks the OOM reaper killing the runner mid-test.
      #
      # NOTE: this is unrelated to the build step's `--parallel 2` above. That pin is
      # a *compile-time* constraint (~3 GB per TU under clang+sanitizer) and does NOT
      # transfer to the test phase — don't "reconcile" the two numbers; they bound
      # different resources (peak compiler RSS vs. peak instrumented-test RSS).
      run: ctest --parallel 2 --output-on-failure --timeout 600 --exclude-regex '^NetworkIntegrationTest\.|^WorkerRestartTest\.'
      env:
        ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
        LSAN_OPTIONS: suppressions=${{github.workspace}}/.github/sanitizer-suppressions/lsan.txt
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      with:
        name: ASan + LSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  ubsan-linux:
    name: UBSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    # See asan-lsan-linux above for why this pins the distro codename.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Free up disk space
      # GitHub-hosted runners ship ~14 GB free; a sanitizer Debug link of
      # OloEngine-Tests (instrumented + vendored static libs) can exhaust it
      # ("No space left on device" during the final link). Reclaim ~20 GB of
      # preinstalled toolchains this job doesn't use. `|| true` keeps a missing
      # path from failing the job; the df lines bracket it for diagnostics.
      run: |
        df -h /
        sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/share/boost 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        df -h /

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        # The ubuntu-24.04 runner image ships Microsoft apt repos (azure-cli, prod)
        # that periodically return 403 Forbidden; we never use them (Clang comes from
        # apt.llvm.org), and `apt-get update` fails hard on any single repo error.
        # Drop any Microsoft source so a Microsoft-side outage can't break our update.
        sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f || true
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    # Provisions sccache before Configure (see asan-lsan-linux for the version-
    # pin rationale and why no generator switch is needed on Linux).
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      with:
        version: "v0.15.0"

    # Persist sccache's local-disk cache as one actions/cache entry (unique key
    # per run so the post-job save always writes a fresh snapshot; restore-keys
    # warms from the most recent prior one). Key is per-sanitizer.
    - name: Cache sccache storage
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-ubsan-linux-${{ github.run_id }}
        restore-keys: |
          sccache-ubsan-linux-

    - name: Configure CMake (UBSan)
      # -fuse-ld=lld: see the ASan + LSan configure step above — BFD ld can
      # OOM the runner during the final OloEngine-Tests link.
      run: >
        cmake -S . -B build
        -DOLO_VIDEO_FFMPEG=OFF
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld
        -DOLO_ENABLE_COMPILER_CACHE=ON
        -DOLO_ENABLE_UBSAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    # Read the cache hit rate. A cold cache (first run / after a real source
    # change) is mostly misses + writes; a warm cache shows a high hit rate,
    # meaning the build step recompiled almost nothing. The delta between a
    # cold and a warm run is the proof this change works.
    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under UBSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # WorkerRestartTest.RestartWorkersAndOversubscription joins the
      # exclude list (matching ASan + TSan) — 100 iterations of a full
      # worker-pool teardown/recreate are too slow under any sanitizer.
      #
      # --timeout 600: same rationale as the ASan + LSan step above —
      # ShaderReflectionBinding compiles ~100 shaders × ~3 stages via
      # shaderc, which is 3-5× slower under UBSan instrumentation.
      #
      # --parallel 2: see the ASan + LSan run step above for the full rationale —
      # one ctest entry per gtest case makes serial execution pay engine static-init
      # ~3,600× over; the suite is parallel-safe (PID/case-name temp paths + a mesh-
      # cache RESOURCE_LOCK), and 2 (not Windows' 4) keeps two sanitizer-instrumented
      # processes inside the ~16 GB / 4-vCPU runner. Independent of the build step's
      # compile-time `--parallel 2` — that bounds compiler RSS, this bounds test RSS.
      run: ctest --parallel 2 --output-on-failure --timeout 600 --exclude-regex '^NetworkIntegrationTest\.|^NetworkManagerTest\.|^NetworkThreadDispatchTest\.|^TaskConcurrencyLimiterTest\.|^LowLevelTaskUserDataTest\.|^WorkerRestartTest\.'
      env:
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      with:
        name: UBSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  tsan-linux:
    name: TSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    timeout-minutes: 90
    # See asan-lsan-linux above for why this pins the distro codename.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Free up disk space
      # GitHub-hosted runners ship ~14 GB free; a sanitizer Debug link of
      # OloEngine-Tests (instrumented + vendored static libs) can exhaust it
      # ("No space left on device" during the final link). Reclaim ~20 GB of
      # preinstalled toolchains this job doesn't use. `|| true` keeps a missing
      # path from failing the job; the df lines bracket it for diagnostics.
      run: |
        df -h /
        sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/share/boost 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        df -h /

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        # The ubuntu-24.04 runner image ships Microsoft apt repos (azure-cli, prod)
        # that periodically return 403 Forbidden; we never use them (Clang comes from
        # apt.llvm.org), and `apt-get update` fails hard on any single repo error.
        # Drop any Microsoft source so a Microsoft-side outage can't break our update.
        sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f || true
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    # Provisions sccache before Configure (see asan-lsan-linux for the version-
    # pin rationale and why no generator switch is needed on Linux).
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      with:
        version: "v0.15.0"

    # Persist sccache's local-disk cache as one actions/cache entry (unique key
    # per run so the post-job save always writes a fresh snapshot; restore-keys
    # warms from the most recent prior one). Key is per-sanitizer.
    - name: Cache sccache storage
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-tsan-linux-${{ github.run_id }}
        restore-keys: |
          sccache-tsan-linux-

    - name: Configure CMake (TSan)
      # -fuse-ld=lld: see the ASan + LSan configure step above — BFD ld can
      # OOM the runner during the final OloEngine-Tests link.
      run: >
        cmake -S . -B build
        -DOLO_VIDEO_FFMPEG=OFF
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld
        -DOLO_ENABLE_COMPILER_CACHE=ON
        -DOLO_ENABLE_TSAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    # Read the cache hit rate. A cold cache (first run / after a real source
    # change) is mostly misses + writes; a warm cache shows a high hit rate,
    # meaning the build step recompiled almost nothing. The delta between a
    # cold and a warm run is the proof this change works.
    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under TSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # --timeout 600: covers two known-slow buckets under TSan instrumentation:
      #   1. AssetContentValidity.SandboxAssetRegistryDeserialisesAndPathsResolve
      #      and AssetContentValidity.EverySupportedAssetOnDiskIsInTheRegistry
      #      walk the sandbox project's asset tree (≥10× slowdown on per-file
      #      stat / Deserialize) — exceeded the 180 s default historically.
      #   2. ShaderReflectionBinding.AllProductionShaderBindingsMatchCppLayout
      #      compiles ~100 .glsl files × ~3 stages through shaderc and reflects
      #      via spirv-cross. TSan's happens-before tracking makes shaderc
      #      especially heavy — even 300 s wasn't enough in practice.
      # Every other test finishes in single-digit seconds, so the headroom
      # only bites the known-slow cases — not a fig leaf over hangs.
      #
      # --parallel 2: see the ASan + LSan run step above for the full rationale
      # (one ctest entry per case → engine static-init paid ~3,600× serially; the
      # suite is parallel-safe via PID/case-name temp paths + a mesh-cache
      # RESOURCE_LOCK). TSan is the most memory-heavy sanitizer — its happens-before
      # shadow gives each test process the largest resident footprint of the three —
      # so 2 is deliberately conservative. But two TSan test processes still sit well
      # within the ~16 GB / 4-vCPU runner (each runs a single short-lived gtest case,
      # not the whole suite at once), so 2-wide is safe rather than left serial.
      # Independent of the build step's compile-time `--parallel 2`: that bounds
      # peak compiler RSS, this bounds peak instrumented-test RSS.
      run: ctest --parallel 2 --output-on-failure --timeout 600 --exclude-regex '^NetworkIntegrationTest\.|^WorkerRestartTest\.'
      env:
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      with:
        name: TSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'
