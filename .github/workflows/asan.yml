name: Sanitizers
on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

permissions:
  contents: read
  # dorny/paths-filter@v4 falls back to the GitHub REST API for PR-base
  # detection on forks / when the git shallow-clone lacks the base commit,
  # which needs pull-requests: read. Granting it here keeps the detect-changes
  # job working even when the default GITHUB_TOKEN has PR scope stripped.
  pull-requests: read

jobs:
  detect-changes:
    name: Detect sanitizer-relevant changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v4
      with:
        filters: |
          native:
            - '**/*.c'
            - '**/*.cc'
            - '**/*.cpp'
            - '**/*.cxx'
            - '**/*.h'
            - '**/*.hpp'
            - '**/*.hh'
            - '**/*.hxx'
            - '**/*.ixx'
            - '**/*.cppm'
            - '**/*.glsl'
            - '**/CMakeLists.txt'
            - 'cmake/**'
            - '.github/actions/**'
            - '.github/workflows/asan.yml'
            - '.github/sanitizer-suppressions/**'

  asan-windows:
    name: ASan (Windows/MSVC)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    runs-on: windows-latest
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Install Python 3.10
      id: py
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install jinja2

    - name: Setup Vulkan SDK
      uses: ./.github/actions/setup-vulkan

    - name: Configure CMake (ASan enabled)
      run: >
        cmake -S . -B build
        -DOLO_VIDEO_FFMPEG=OFF
        -DPython_EXECUTABLE="${{ steps.py.outputs.python-path }}"
        -DOLO_ENABLE_ASAN=ON
        -DBUILD_TESTS=ON

    - name: Build (Release)
      run: cmake --build build --config Release --target OloEngine-Tests --parallel

    - name: Create test results directory
      run: New-Item -ItemType Directory -Force -Path "${{github.workspace}}/test_results"
      shell: pwsh

    - name: Add MSVC ASan runtime to PATH
      shell: pwsh
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        $msvcDir = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
        $binDir = "$($msvcDir.FullName)\bin\Hostx64\x64"
        Write-Host "Adding MSVC bin to PATH: $binDir"
        echo "$binDir" >> $env:GITHUB_PATH

    - name: Run tests under ASan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # The SteamNetworkingSockets service thread tripped a stack-buffer-overflow
      # under MSVC ASan during thread bootstrap (a 48-byte read from a 24-byte
      # `info` stack object inside vendored GNS code on the GNS-spawned thread;
      # Release ICF folding misreported the frames as `SteamNetworkingSockets_*` /
      # `pugi::xpath_*`). That is now fixed at the source: NetworkManager::Init
      # skips the live GameNetworkingSockets_Init under ASan (OLO_ASAN_ENABLED),
      # so every suite that merely constructs/uses NetworkManager runs clean.
      #
      # The Task* and Shader* suites were excluded here on a since-disproven "the
      # task system starts the Steam service thread" theory — they never touched
      # GNS (the ICF-folded stacks just looked like it) and all pass under MSVC
      # ASan, so they are no longer excluded. See issue #317.
      #
      # Remaining exclusions match the Linux ASan job exactly:
      #   NetworkIntegrationTest — drives a live client/server socket, which the
      #     ASan GNS gate intentionally disables; excluded on every sanitizer job.
      #   WorkerRestartTest — a tight 100-iteration worker-pool teardown/recreate
      #     stress test that exceeds the 120 s timeout under sanitizer
      #     instrumentation; excluded on every sanitizer job.
      run: ctest -C Release --output-on-failure --timeout 120 --exclude-regex '^NetworkIntegrationTest\.|^WorkerRestartTest\.'
      env:
        ASAN_OPTIONS: halt_on_error=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: ASan (Windows)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  asan-lsan-linux:
    name: ASan + LSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    # Pinned to ubuntu-24.04 (noble) because the LLVM apt repo URL below
    # hardcodes the distro codename. If ubuntu-latest jumps to a newer
    # release the apt source would 404.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Free up disk space
      # GitHub-hosted runners ship ~14 GB free; a sanitizer Debug link of
      # OloEngine-Tests (instrumented + vendored static libs) can exhaust it
      # ("No space left on device" during the final link). Reclaim ~20 GB of
      # preinstalled toolchains this job doesn't use. `|| true` keeps a missing
      # path from failing the job; the df lines bracket it for diagnostics.
      run: |
        df -h /
        sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/share/boost 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        df -h /

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    - name: Configure CMake (ASan + LSan)
      # -fuse-ld=lld: the default GNU BFD ld holds the entire Debug +
      # sanitizer-instrumented link (engine, vendored static libs, DWARF) in
      # memory at once and can exceed the 16 GB on hosted runners — the OOM
      # reaper then kills the runner agent mid-link ("The runner has received
      # a shutdown signal", gmake "Terminated", partial output deleted). lld
      # (installed above, version-matched via clang's own bin dir) links the
      # same binary in a fraction of the memory and time.
      run: >
        cmake -S . -B build
        -DOLO_VIDEO_FFMPEG=OFF
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld
        -DOLO_ENABLE_ASAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under ASan + LSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # WorkerRestartTest.RestartWorkersAndOversubscription is a tight-loop
      # stress test of FScheduler::RestartWorkers that the Windows ASan job
      # (asan.yml above) and the Linux TSan job (tsan.yml) already exclude
      # as too slow under sanitizer instrumentation — hits the 120 s timeout
      # in CI. Pre-existing flakiness, unrelated to PR contents.
      #
      # --timeout 600: ShaderReflectionBinding.AllProductionShaderBindingsMatchCppLayout
      # walks every production .glsl (~100 files × ~3 stages), invoking
      # shaderc to compile each to SPIR-V and spirv-cross to reflect the
      # bindings. Under ASan instrumentation shaderc is 3-5× slower per
      # compile, and the cumulative work blows past the default 120 s.
      # 600 s gives reasonable headroom without masking actual hangs.
      run: ctest --output-on-failure --timeout 600 --exclude-regex '^NetworkIntegrationTest\.|^WorkerRestartTest\.'
      env:
        ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
        LSAN_OPTIONS: suppressions=${{github.workspace}}/.github/sanitizer-suppressions/lsan.txt
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: ASan + LSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  ubsan-linux:
    name: UBSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    # See asan-lsan-linux above for why this pins the distro codename.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Free up disk space
      # GitHub-hosted runners ship ~14 GB free; a sanitizer Debug link of
      # OloEngine-Tests (instrumented + vendored static libs) can exhaust it
      # ("No space left on device" during the final link). Reclaim ~20 GB of
      # preinstalled toolchains this job doesn't use. `|| true` keeps a missing
      # path from failing the job; the df lines bracket it for diagnostics.
      run: |
        df -h /
        sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/share/boost 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        df -h /

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    - name: Configure CMake (UBSan)
      # -fuse-ld=lld: see the ASan + LSan configure step above — BFD ld can
      # OOM the runner during the final OloEngine-Tests link.
      run: >
        cmake -S . -B build
        -DOLO_VIDEO_FFMPEG=OFF
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld
        -DOLO_ENABLE_UBSAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under UBSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # WorkerRestartTest.RestartWorkersAndOversubscription joins the
      # exclude list (matching ASan + TSan) — 100 iterations of a full
      # worker-pool teardown/recreate are too slow under any sanitizer.
      #
      # --timeout 600: same rationale as the ASan + LSan step above —
      # ShaderReflectionBinding compiles ~100 shaders × ~3 stages via
      # shaderc, which is 3-5× slower under UBSan instrumentation.
      run: ctest --output-on-failure --timeout 600 --exclude-regex '^NetworkIntegrationTest\.|^NetworkManagerTest\.|^NetworkThreadDispatchTest\.|^TaskConcurrencyLimiterTest\.|^LowLevelTaskUserDataTest\.|^WorkerRestartTest\.'
      env:
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: UBSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  tsan-linux:
    name: TSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    timeout-minutes: 90
    # See asan-lsan-linux above for why this pins the distro codename.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Free up disk space
      # GitHub-hosted runners ship ~14 GB free; a sanitizer Debug link of
      # OloEngine-Tests (instrumented + vendored static libs) can exhaust it
      # ("No space left on device" during the final link). Reclaim ~20 GB of
      # preinstalled toolchains this job doesn't use. `|| true` keeps a missing
      # path from failing the job; the df lines bracket it for diagnostics.
      run: |
        df -h /
        sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/share/boost 2>/dev/null || true
        sudo docker image prune --all --force 2>/dev/null || true
        df -h /

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    - name: Configure CMake (TSan)
      # -fuse-ld=lld: see the ASan + LSan configure step above — BFD ld can
      # OOM the runner during the final OloEngine-Tests link.
      run: >
        cmake -S . -B build
        -DOLO_VIDEO_FFMPEG=OFF
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld
        -DOLO_ENABLE_TSAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under TSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # --timeout 600: covers two known-slow buckets under TSan instrumentation:
      #   1. AssetContentValidity.SandboxAssetRegistryDeserialisesAndPathsResolve
      #      and AssetContentValidity.EverySupportedAssetOnDiskIsInTheRegistry
      #      walk the sandbox project's asset tree (≥10× slowdown on per-file
      #      stat / Deserialize) — exceeded the 180 s default historically.
      #   2. ShaderReflectionBinding.AllProductionShaderBindingsMatchCppLayout
      #      compiles ~100 .glsl files × ~3 stages through shaderc and reflects
      #      via spirv-cross. TSan's happens-before tracking makes shaderc
      #      especially heavy — even 300 s wasn't enough in practice.
      # Every other test finishes in single-digit seconds, so the headroom
      # only bites the known-slow cases — not a fig leaf over hangs.
      run: ctest --output-on-failure --timeout 600 --exclude-regex '^NetworkIntegrationTest\.|^WorkerRestartTest\.'
      env:
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: TSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'
