name: Sanitizers
on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

permissions:
  contents: read
  # dorny/paths-filter@v4 falls back to the GitHub REST API for PR-base
  # detection on forks / when the git shallow-clone lacks the base commit,
  # which needs pull-requests: read. Granting it here keeps the detect-changes
  # job working even when the default GITHUB_TOKEN has PR scope stripped.
  pull-requests: read

jobs:
  detect-changes:
    name: Detect sanitizer-relevant changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v4
      with:
        filters: |
          native:
            - '**/*.c'
            - '**/*.cc'
            - '**/*.cpp'
            - '**/*.cxx'
            - '**/*.h'
            - '**/*.hpp'
            - '**/*.hh'
            - '**/*.hxx'
            - '**/*.ixx'
            - '**/*.cppm'
            - '**/*.glsl'
            - '**/CMakeLists.txt'
            - 'cmake/**'
            - '.github/actions/**'
            - '.github/workflows/asan.yml'
            - '.github/sanitizer-suppressions/**'

  asan-windows:
    name: ASan (Windows/MSVC)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    runs-on: windows-latest
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Install Python 3.10
      id: py
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install jinja2

    - name: Setup Vulkan SDK
      uses: ./.github/actions/setup-vulkan

    - name: Configure CMake (ASan enabled)
      run: >
        cmake -S . -B build
        -DPython_EXECUTABLE="${{ steps.py.outputs.python-path }}"
        -DOLO_ENABLE_ASAN=ON
        -DBUILD_TESTS=ON

    - name: Build (Release)
      run: cmake --build build --config Release --target OloEngine-Tests --parallel

    - name: Create test results directory
      run: New-Item -ItemType Directory -Force -Path "${{github.workspace}}/test_results"
      shell: pwsh

    - name: Add MSVC ASan runtime to PATH
      shell: pwsh
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        $msvcDir = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
        $binDir = "$($msvcDir.FullName)\bin\Hostx64\x64"
        Write-Host "Adding MSVC bin to PATH: $binDir"
        echo "$binDir" >> $env:GITHUB_PATH

    - name: Run tests under ASan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # Windows ASan + SteamNetworkingSockets incompatibility: every test
      # process touching the task system initializes the Steam service
      # thread, whose startup callback AVs under MSVC ASan (see the
      # `asan_thread_start -> SteamNetworkingSockets_SetServiceThreadInitCallback`
      # stacks in CI logs). Debug symbols get misresolved via ICF to
      # `pugi::xpath_*` names. This is pre-existing infrastructure fallout,
      # not a test-code bug — the same tests pass under Linux ASan/UBSan.
      # Excluding the affected suites until Steam networking init is made
      # ASan-compatible (or moved behind a test-time skip).
      #
      # The Shader* suites below were added after they started reporting the
      # same ICF-misresolved `pugi::xml_attribute_iterator` /
      # `SteamNetworkingSockets_*` container-overflow stacks during static
      # init. They pass under Linux ASan/UBSan/TSan — same root cause as
      # the task-system suites above, not a shader-pipeline bug.
      #
      # TODO(open GitHub issue):
      #   Title: Track SteamNetworkingSockets + MSVC ASan AV in Windows ASan CI
      #   CI job / step: ASan (Windows/MSVC) / Run tests under ASan
      #   Repro:
      #     1. Run the Windows ASan workflow job from .github/workflows/asan.yml.
      #     2. Configure/build OloEngine-Tests with OLO_ENABLE_ASAN=ON.
      #     3. Run the ctest command below after re-enabling the excluded suites.
      #     4. Observe the AV during Steam service-thread init at
      #        `asan_thread_start -> SteamNetworkingSockets_SetServiceThreadInitCallback`.
      #   Excluded suites regex:
      #     ^NetworkIntegrationTest\.|^TaskSystemTest\.|^TaskEventTest\.|^NestedTasksTest\.|^PipeTest\.|^TaskDependenciesTest\.|^TaskStressTest\.|^MakeCompletedTaskTest\.|^IsAwaitableTest\.|^WaitAnyTest\.|^AnyTest\.|^DeepRetractionTest\.|^InlineTaskTest\.|^MoveOnlyResultTest\.|^TaskSelfAccessTest\.|^NestedTaskStressTest\.|^ConcurrentEventTriggerTest\.|^CancellationTokenTest\.|^WorkerRestartTest\.|^TaskConcurrencyLimiterTest\.|^ShaderReflectionBinding\.|^ShaderCrossConsistency\.|^ShaderUBOSizeConsistency\.|^ShaderStageInterface\.|^ShaderStageContract\.
      #   Suggested labels: github_actions, bug, help wanted
      #   (or future repo labels: area:ci, technical-debt, needs-investigation)
      run: ctest -C Release --output-on-failure --timeout 120 --exclude-regex '^NetworkIntegrationTest\.|^TaskSystemTest\.|^TaskEventTest\.|^NestedTasksTest\.|^PipeTest\.|^TaskDependenciesTest\.|^TaskStressTest\.|^MakeCompletedTaskTest\.|^IsAwaitableTest\.|^WaitAnyTest\.|^AnyTest\.|^DeepRetractionTest\.|^InlineTaskTest\.|^MoveOnlyResultTest\.|^TaskSelfAccessTest\.|^NestedTaskStressTest\.|^ConcurrentEventTriggerTest\.|^CancellationTokenTest\.|^WorkerRestartTest\.|^TaskConcurrencyLimiterTest\.|^ShaderReflectionBinding\.|^ShaderCrossConsistency\.|^ShaderUBOSizeConsistency\.|^ShaderStageInterface\.|^ShaderStageContract\.'
      env:
        ASAN_OPTIONS: halt_on_error=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: ASan (Windows)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  asan-lsan-linux:
    name: ASan + LSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    # Pinned to ubuntu-24.04 (noble) because the LLVM apt repo URL below
    # hardcodes the distro codename. If ubuntu-latest jumps to a newer
    # release the apt source would 404.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    - name: Configure CMake (ASan + LSan)
      run: >
        cmake -S . -B build
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DOLO_ENABLE_ASAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under ASan + LSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      run: ctest --output-on-failure --timeout 120 --exclude-regex '^NetworkIntegrationTest\.'
      env:
        ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
        LSAN_OPTIONS: suppressions=${{github.workspace}}/.github/sanitizer-suppressions/lsan.txt
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: ASan + LSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  ubsan-linux:
    name: UBSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    # See asan-lsan-linux above for why this pins the distro codename.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    - name: Configure CMake (UBSan)
      run: >
        cmake -S . -B build
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DOLO_ENABLE_UBSAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under UBSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      run: ctest --output-on-failure --timeout 120 --exclude-regex '^NetworkIntegrationTest\.|^NetworkManagerTest\.|^NetworkThreadDispatchTest\.|^TaskConcurrencyLimiterTest\.|^LowLevelTaskUserDataTest\.'
      env:
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: UBSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'

  tsan-linux:
    name: TSan (Linux/Clang)
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.native == 'true' }}
    timeout-minutes: 90
    # See asan-lsan-linux above for why this pins the distro codename.
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions replace the workflow-level block entirely,
      # so re-declare contents: read alongside checks: write. Without it
      # actions/checkout@v6 would fail on fork PRs.
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6

    - name: Install Clang 19
      run: |
        wget --max-redirect=0 -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-19 lld-19 \
          libvulkan-dev vulkan-validationlayers \
          libgl-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev \
          glslang-dev libshaderc-dev libspirv-cross-c-shared-dev spirv-tools \
          python3 python3-pip
        python3 -m pip install --upgrade pip jinja2

    - name: Configure CMake (TSan)
      run: >
        cmake -S . -B build
        -DCMAKE_CXX_COMPILER=clang++-19
        -DCMAKE_C_COMPILER=clang-19
        -DCMAKE_BUILD_TYPE=Debug
        -DOLO_ENABLE_TSAN=ON
        -DBUILD_TESTS=ON

    - name: Build tests
      # Pinned to --parallel 2: higher concurrency has been observed to
      # exhaust runner memory (clang++ under sanitizer instrumentation uses
      # ~3 GB per translation unit), causing `The hosted runner lost
      # communication with the server` failures.
      run: cmake --build build --target OloEngine-Tests --parallel 2

    - name: Create test results directory
      run: mkdir -p "${GITHUB_WORKSPACE}/test_results"

    - name: Run tests under TSan
      working-directory: ${{github.workspace}}/build/OloEngine/tests
      # --timeout 300: AssetContentValidity.SandboxAssetRegistryDeserialisesAndPathsResolve
      # and AssetContentValidity.EverySupportedAssetOnDiskIsInTheRegistry walk the
      # sandbox project's asset tree under TSan instrumentation (≥10× slowdown on
      # the per-file stat / Deserialize hot path) and have been observed to exceed
      # the 180s default in CI. Every other test in the suite finishes in single-
      # digit seconds, so this only bites the known-slow filesystem-bound cases —
      # not a fig leaf over hangs.
      run: ctest --output-on-failure --timeout 300 --exclude-regex '^NetworkIntegrationTest\.|^WorkerRestartTest\.'
      env:
        TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        GTEST_OUTPUT: xml:${{github.workspace}}/test_results/

    - name: Test report
      # Fork PRs can't write checks (job-level `checks: write` is downgraded
      # to read for forks). Skip the reporter there; same-repo PRs and
      # push/workflow_dispatch runs retain full permissions.
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v3
      with:
        name: TSan (Linux)
        path: test_results/*.xml
        reporter: java-junit
        fail-on-error: false
        list-tests: 'failed'
