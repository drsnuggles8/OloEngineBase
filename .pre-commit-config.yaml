# Skip vendor, mono, and common IDE/build metadata
# pre-commit paths are matched against repository-relative file paths; the regex below
# excludes common third-party / generated directories we don't want to modify.
# Match either start-of-string or a path separator before the directory name so
# that subdirectories (e.g. `OloEngine/mono/`) are excluded as well.
exclude: '(^|/)(vendor|mono|\.vs|\.vscode|build|bin|\.github/workflows|\.idea)/'

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: trailing-whitespace
      # Limit to common source file extensions (C/C++, C#, Lua, shaders, headers)
      files: '\.(c|cc|cpp|cxx|h|hh|hpp|ipp|inl|cs|lua|glsl|vert|frag|shader)$'
    - id: end-of-file-fixer
      files: '\.(c|cc|cpp|cxx|h|hh|hpp|ipp|inl|cs|lua|glsl|vert|frag|shader)$'
    - id: check-yaml

- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v21.1.8
  hooks:
    - id: clang-format
      name: clang-format
      files: '\.(c|cc|cpp|cxx|h|hh|hpp|ipp|inl)$'
      exclude: '^OloEngine/(vendor|mono)/'
      args: ["--style=file"]

- repo: local
  hooks:
    - id: test-catalogue-classified
      name: every test file is classified
      description: >-
        Fails if a test .cpp is classified by neither an in-file
        '// OLO_TEST_LAYER: <id>' marker nor a file_layer_map entry in
        OloEngine/tests/scripts/test_catalogue.json. The rendered catalogue tables
        are generated, git-ignored documents (docs/test-catalogue.*.md) and are NOT
        checked for staleness here. Regenerate them with
        'python OloEngine/tests/scripts/generate_test_catalogue.py'.
      entry: python OloEngine/tests/scripts/generate_test_catalogue.py --check
      language: system
      pass_filenames: false
      files: '(OloEngine/tests/.*\.cpp|OloEngine/tests/scripts/(test_catalogue\.json|generate_test_catalogue\.py))$'
